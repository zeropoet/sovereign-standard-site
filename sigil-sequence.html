<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sigil Sequence</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      --bg: #000000;
      --panel: #0d0d0d;
      --line: #1f1f1f;
      --text: #f5f5f5;
      --muted: #9a9a9a;
      --accent: #ffffff;
      --mono: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
    }

    body {
      padding: 16px 24px 24px;
    }

    main {
      display: grid;
      gap: 24px;
      justify-items: start;
    }

    .nav {
      color: var(--muted);
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .nav:hover {
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 0.2em;
    }

    .player-shell {
      display: grid;
      gap: 18px;
    }

    .player-head {
      display: grid;
      gap: 8px;
    }

    .player-title {
      margin: 0;
      font-size: clamp(20px, 4vw, 30px);
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .player-meta {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
      letter-spacing: 0.01em;
    }

    .stage {
      width: min(100%, 400px);
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      background: #000000;
      border: 1px solid var(--line);
    }

    .stage img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: invert(1);
      display: block;
    }

    .controls {
      width: min(100%, 400px);
      display: grid;
      gap: 14px;
      padding: 16px;
      background: var(--panel);
      border: 1px solid var(--line);
    }

    .control-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 12px;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.7rem 0.9rem;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    input[type="range"] {
      width: min(100%, 400px);
      accent-color: #ffffff;
    }

    .speed {
      min-width: 4ch;
      color: var(--text);
    }

    .site-contact {
      width: min(100%, 400px);
      display: grid;
      gap: 8px;
      padding: calc(1.5rem - 0.1rem) 1.5rem;
      background: var(--panel);
      border: 1px solid var(--line);
    }

    .site-contact-label {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .site-contact-link {
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      letter-spacing: 0.04em;
      text-decoration: none;
      word-break: break-word;
    }

    .site-contact-link:hover {
      text-decoration: underline;
      text-underline-offset: 0.2em;
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <main>
    <a href="index.html" class="nav">Back</a>

    <section class="player-shell" data-sigil-sequence data-sequence-mode="player" data-sequence-fps="8" data-sequence-autoplay="true">
      <header class="player-head">
        <h1 class="player-title">Sigil Sequence</h1>
        <p class="player-meta" data-sequence-label>Loading units...</p>
      </header>

      <div class="stage">
        <img data-sequence-image alt="Sigil sequence frame">
      </div>

      <section class="controls" aria-label="Playback controls">
        <div class="control-row">
          <button data-sequence-toggle type="button">Pause</button>
          <button data-sequence-prev type="button">Previous</button>
          <button data-sequence-next type="button">Next</button>
          <label for="speed-control">Speed <span class="speed" data-sequence-speed-value>8 fps</span></label>
          <input id="speed-control" data-sequence-speed type="range" min="1" max="24" step="1" value="8">
        </div>
        <input data-sequence-frame type="range" min="0" max="0" step="1" value="0" aria-label="Frame scrubber">
      </section>
    </section>

    <section class="site-contact" aria-label="Contact">
      <p class="site-contact-label">For product questions</p>
      <a class="site-contact-link" href="mailto:hello@sovereignstandard.co">hello@sovereignstandard.co</a>
    </section>
  </main>

  <script src="sigil-sequence.js"></script>
</body>
</html>
