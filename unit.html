<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit Redirect | Sovereign Standard</title>
  <meta http-equiv="refresh" content="0; url=standardcontrol.html">
  <link rel="canonical" href="https://sovereignstandard.co/standardcontrol.html">
  <script>
    const params = new URLSearchParams(window.location.search);
    const unit = params.get('unit') || params.get('id');
    const target = unit ? `standardcontrol.html?unit=${encodeURIComponent(unit)}` : 'standardcontrol.html';
    window.location.replace(target);
  </script>
</head>
<body></body>
</html>
