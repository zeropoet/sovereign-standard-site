<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlas | Sovereign Standard</title>
  <meta name="description" content="A light-ground vessel-first projection of sealed and collected Sovereign Standard units.">
  <link rel="canonical" href="https://sovereignstandard.co/atlas.html">
  <link rel="icon" href="assets/favicons/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicons/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="assets/favicons/favicon-48x48.png">
  <link rel="icon" type="image/png" sizes="64x64" href="assets/favicons/favicon-64x64.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/favicons/android-chrome-192x192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Sovereign Standard">
  <meta property="og:title" content="Atlas | Sovereign Standard">
  <meta property="og:description" content="A light-ground vessel-first projection of sealed and collected Sovereign Standard units.">
  <meta property="og:url" content="https://sovereignstandard.co/atlas.html">
  <meta property="og:image" content="https://sovereignstandard.co/assets/social-preview.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Atlas | Sovereign Standard">
  <meta name="twitter:description" content="A light-ground vessel-first projection of sealed and collected Sovereign Standard units.">
  <meta name="twitter:image" content="https://sovereignstandard.co/assets/social-preview.svg">
  <meta name="theme-color" content="#ffffff">
  <script>
    (() => {
      try {
        const navState = sessionStorage.getItem('sovereign-standard.nav');
        if (!navState) {
          return;
        }

        const parsed = JSON.parse(navState);
        if (!parsed || !parsed.to) {
          return;
        }

        if (parsed.to.includes('atlas.html')) {
          document.documentElement.classList.add('has-pending-nav');
          document.documentElement.dataset.navKind = parsed.kind || '';
          document.documentElement.dataset.navFrom = parsed.fromPage || '';
        }
      } catch {
      }
    })();
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="atlas">
  <main class="atlas-screen" data-fluid-root>
    <nav class="top-links site-object-nav atlas-nav" aria-label="Primary">
      <a href="index.html" class="nav" data-nav-kind="return-index">Home</a>
      <a href="archive.html" class="nav" data-nav-kind="return-archive">Archive</a>
      <a href="purchase.html" class="nav">Acquire</a>
      <a href="orders.html" class="nav">Orders</a>
      <a href="atlas.html" class="nav nav-active">Atlas</a>
    </nav>
    <header class="page-header artifact-header atlas-header">
      <div class="atlas-title-block">
        <h1 class="page-title">Atlas</h1>
      </div>
    </header>

    <section class="atlas-field-shell">
      <div class="atlas-field">
        <svg id="atlas-topology" class="atlas-topology" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet" aria-label="Atlas topology field"></svg>
      </div>

      <div class="atlas-header-row atlas-readout-meta">
        <p id="atlas-expression-copy" class="page-intro atlas-intro" hidden></p>
        <label class="atlas-search" for="atlas-unit-search">
          <input id="atlas-unit-search" name="atlas-unit-search" type="search" inputmode="numeric" placeholder="UNIT" autocomplete="off">
          <span id="atlas-unit-total" class="atlas-search-total">/ 000</span>
        </label>
      </div>

      <div id="atlas-unit-profile" class="atlas-readout-dock">
        <p class="muted">Select a unit to inspect its vessel state and archive position.</p>
      </div>
    </section>
  </main>

  <script src="site.js"></script>
  <script src="atlas.js"></script>
</body>
</html>
