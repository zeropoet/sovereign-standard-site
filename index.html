<body>
  <main class="landing-page" aria-label="Sovereign Standard">
    <section class="landing-shell">
      <img
        src="assets/sovereign-standard-lockup.svg"
        alt="Sovereign Standard"
        class="landing-wordmark"
        width="700"
        height="210"

        class="landing-sequence is-hidden"
        aria-label="Sigil sequence"
        data-sigil-sequence
        data-sequence-mode="display"
        data-sequence-fps="8"

        <div class="sequence-stage">
          <img data-sequence-image alt="Sigil sequence frame">
        </div>
      </section>
      <nav class="top-links landing-links" aria-label="Primary">
        <a href="archive.html" class="landing-link">Enter Archive</a>
      </nav>
      <nav class="landing-secondary-links" aria-label="Secondary">
        <a href="purchase.html" class="landing-link">Purchase Units</a>
        <a href="orders.html" class="landing-link">Order Ledger</a>
      </nav>
    </section>
  </main>
  <script src="site.js"></script>
  <script src="sigil-sequence.js"></script>
