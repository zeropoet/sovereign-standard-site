<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders | Sovereign Standard</title>
  <meta name="description" content="Review the committed Sovereign Standard order ledger.">
  <link rel="canonical" href="https://sovereignstandard.co/orders.html">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="artifact-page">
    <nav class="top-links site-object-nav" aria-label="Primary">
      <a href="index.html" class="nav">Home</a>
      <a href="archive.html" class="nav">Archive</a>
      <a href="purchase.html" class="nav">Acquire</a>
      <a href="orders.html" class="nav nav-active" aria-current="page">Orders</a>
      <a href="atlas.html" class="nav">Atlas</a>
    </nav>
    <header class="page-header artifact-header">
      <h1 class="page-title">Orders</h1>
    </header>

    <section class="artifact-section order-overview-layout">
      <section class="panel section-stack state-section">
        <div class="section-head">
          <h2>Overview</h2>
        </div>
        <p id="orders-summary" class="muted order-status">Loading committed order ledger...</p>
      </section>

      <section
        class="panel order-overview-media"
        aria-label="Sigil sequence"
        data-sigil-sequence
        data-sequence-fps="8"
        data-sequence-autoplay="true"
      >
        <div class="order-overview-stage">
          <img data-sequence-image alt="Sigil sequence frame">
        </div>
      </section>
    </section>

    <section class="artifact-section orders-intro-section">
      <p class="page-intro">Committed order state, organized by ledger sequence.</p>
    </section>

    <section class="panel section-stack artifact-section metadata-section orders-section">
      <div class="section-head">
        <h2>Orders</h2>
      </div>
      <div id="orders-list" class="ledger-list"></div>
    </section>

    <footer class="site-footer artifact-section">
      <p class="muted">Standard, held.</p>
    </footer>

  </main>

  <script src="sigil-sequence.js"></script>
  <script src="site.js"></script>
  <script>
    function escapeHTML(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatTimestamp(value) {
      if (!value) {
        return 'Pending';
      }

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }

      return new Intl.DateTimeFormat(undefined, {
        dateStyle: 'long',
        timeStyle: 'short'
      }).format(date);
    }

    function formatAmount(amountTotal, currency) {
      if (typeof amountTotal !== 'number') {
        return 'Pending';
      }

      const code = String(currency || 'USD').toUpperCase();
      return `${code} ${(amountTotal / 100).toFixed(2)}`;
    }

    async function loadOrders() {
      const summary = document.getElementById('orders-summary');
      const list = document.getElementById('orders-list');
      const response = await fetch('orders.json', { cache: 'no-store' });
      const payload = await response.json();

      if (!response.ok) {
        throw new Error(payload.error || 'Unable to load order ledger.');
      }

      const orders = Array.isArray(payload.orders) ? payload.orders : [];
      const totalUnits = orders.reduce((sum, order) => sum + Number(order.quantity || 0), 0);

      summary.innerHTML = `${orders.length} orders recorded.<br>${totalUnits} total units allocated or requested through the ledger.`;

      if (!orders.length) {
        list.innerHTML = '<p class="muted">No committed orders yet.</p>';
        return;
      }

      list.innerHTML = orders.map((order) => {
        const units = Array.isArray(order.assigned_units) && order.assigned_units.length
          ? order.assigned_units.join(', ')
          : 'Pending';

        return `
          <article class="ledger-card">
            <div class="ledger-card-head">
              <h3>Order ${escapeHTML(order.sequence)}</h3>
            </div>
            <div class="invoice-columns">
              <div class="invoice-list">
                <div class="invoice-row"><span class="invoice-label">Ledger Sequence:</span><span class="code">${escapeHTML(order.sequence)}</span></div>
                <div class="invoice-row"><span class="invoice-label">Order ID:</span><span class="code code-wrap">${escapeHTML(order.order_id || '')}</span></div>
                <div class="invoice-row"><span class="invoice-label">Quantity:</span><span class="code">${escapeHTML(order.quantity || 0)}</span></div>
                <div class="invoice-row"><span class="invoice-label">Assigned Units:</span><span class="code code-wrap">${escapeHTML(units)}</span></div>
              </div>
              <div class="invoice-list">
                <div class="invoice-row"><span class="invoice-label">Created:</span><span class="code">${escapeHTML(formatTimestamp(order.created_at))}</span></div>
                <div class="invoice-row"><span class="invoice-label">Paid:</span><span class="code">${escapeHTML(formatTimestamp(order.paid_at))}</span></div>
                <div class="invoice-row"><span class="invoice-label">Amount:</span><span class="code">${escapeHTML(formatAmount(order.amount_total, order.currency))}</span></div>
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    loadOrders().catch((error) => {
      document.getElementById('orders-summary').textContent = error.message || 'Unable to load order ledger.';
    });
  </script>
</body>
</html>
