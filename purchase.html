<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purchase Units | Sovereign Standard</title>
  <meta name="description" content="Purchase sequential Sovereign Standard units.">
  <link rel="canonical" href="https://sovereignstandard.co/purchase.html">
  <meta name="theme-color" content="#000000">
  <meta name="sovereign-commerce-endpoint" content="https://sovereign-standard-claim-relay.mancel.workers.dev">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="artifact-page">
    <a href="index.html" class="site-object-lockup-link" aria-label="Sovereign Standard home">
      <img
        src="assets/sovereign-standard-lockup.png"
        alt="Sovereign Standard"
        class="site-object-lockup"
        width="700"
        height="210"
      >
    </a>
    <nav class="top-links site-object-nav" aria-label="Primary">
      <a href="archive.html" class="nav">Archive</a>
      <a href="purchase.html" class="nav nav-active" aria-current="page">Purchase</a>
      <a href="orders.html" class="nav">Orders</a>
      <a href="atlas.html" class="nav">Atlas</a>
    </nav>
    <header class="page-header artifact-header">
      <h1 class="page-title">Purchase</h1>
    </header>

    <section class="purchase-layout artifact-section">
      <section class="panel section-stack purchase-order-column">
        <div class="section-head">
          <h2>Purchase</h2>
          <p class="purchase-note">Select the number of units you want to purchase. Sequence assignment happens after checkout confirmation.</p>
        </div>
        <form id="purchase-form" class="order-panel">
          <label class="order-field">
            Quantity
            <input type="number" name="quantity" min="1" max="102" value="1" inputmode="numeric" required>
          </label>
          <label class="order-field">
            Partner Token
            <input type="text" name="partner_token" autocomplete="off" autocapitalize="characters" spellcheck="false">
          </label>
          <div class="section-head order-total-head">
            <h2>Order total</h2>
          </div>
          <div class="order-total">
            <p id="order-pricing" class="muted order-helper-note">Standard pricing total for 1 unit: $68</p>
          </div>
          <div class="order-actions">
            <button class="order-submit" type="submit">Checkout</button>
            <p id="purchase-status" class="muted order-status"></p>
          </div>
        </form>
      </section>

      <section class="panel section-stack purchase-sequence-column" aria-label="Sovereign Standard unit">
        <div class="purchase-sequence-stage">
          <img
            src="assets/unit-image-ref-3.jpeg"
            alt="Sovereign Standard unit container"
            width="768"
            height="768"
          >
        </div>
      </section>
    </section>

    <footer class="site-footer artifact-section">
      <p class="muted">Standard, held.</p>
    </footer>
  </main>

  <script src="site.js"></script>
  <script>
    const endpoint = document
      .querySelector('meta[name="sovereign-commerce-endpoint"]')
      ?.getAttribute('content')
      ?.trim()
      ?.replace(/\/$/, '');

    const form = document.getElementById('purchase-form');
    const status = document.getElementById('purchase-status');
    const pricing = document.getElementById('order-pricing');
    const quantityInput = form.elements.quantity;
    const partnerTokenInput = form.elements.partner_token;
    const STANDARD_UNIT_PRICE = 68;
    const PARTNER_UNIT_PRICE = 34;

    function formatDollars(value) {
      return `$${value.toFixed(0)}`;
    }

    function updatePricing() {
      const quantity = Math.max(1, Number(quantityInput.value) || 1);
      const unitsLabel = `${quantity} unit${quantity === 1 ? '' : 's'}`;
      const hasPartnerToken = String(partnerTokenInput.value || '').trim().length > 0;
      pricing.textContent = hasPartnerToken
        ? `Partner pricing total for ${unitsLabel}: ${formatDollars(quantity * PARTNER_UNIT_PRICE)}`
        : `Standard pricing total for ${unitsLabel}: ${formatDollars(quantity * STANDARD_UNIT_PRICE)}`;
    }

    if (new URLSearchParams(window.location.search).get('cancelled') === '1') {
      status.textContent = 'Checkout was canceled. You can try again whenever you are ready.';
    }

    quantityInput.addEventListener('input', updatePricing);
    partnerTokenInput.addEventListener('input', updatePricing);
    updatePricing();

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      if (!form.reportValidity()) {
        return;
      }

      const submitButton = form.querySelector('button[type="submit"]');
      const data = new FormData(form);
      submitButton.disabled = true;
      status.textContent = 'Opening secure checkout...';

      try {
        const response = await fetch(`${endpoint}/checkout`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            quantity: Number(data.get('quantity') || 0),
            partner_token: String(data.get('partner_token') || '').trim()
          })
        });

        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || 'Unable to create checkout session.');
        }

        status.textContent = 'Redirecting to Stripe checkout...';
        window.location.href = payload.checkout_url;
      } catch (error) {
        status.textContent = error.message || 'Unable to create checkout session.';
        submitButton.disabled = false;
      }
    });
  </script>
</body>
</html>
