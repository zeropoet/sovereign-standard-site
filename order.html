<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Status | Sovereign Standard</title>
  <meta name="description" content="Track a Sovereign Standard order.">
  <link rel="canonical" href="https://sovereignstandard.co/order.html">
  <meta name="theme-color" content="#000000">
  <meta name="sovereign-commerce-endpoint" content="https://sovereign-standard-claim-relay.mancel.workers.dev">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="artifact-page">
    <nav class="top-links" aria-label="Primary">
      <a href="index.html" class="nav">Back</a>
    </nav>
    <header class="page-header artifact-header">
      <h1 class="page-title">Order Status</h1>
      <p class="page-intro">Orders are assigned sequentially after the reserved partner range.</p>
    </header>

    <section class="panel section-stack artifact-section state-section">
      <div class="section-head">
        <h2>Status</h2>
      </div>
      <div class="state-panel">
        <div class="state-block">
          <div class="state-label" id="order-status-label">Loading</div>
          <p id="order-status" class="state-detail muted order-status"></p>
        </div>
      </div>
    </section>

    <section class="panel section-stack artifact-section metadata-section">
      <div class="section-head">
        <h2>Order</h2>
      </div>
      <div class="invoice-list" id="order-meta"></div>
    </section>
  </main>

  <script src="site.js"></script>
  <script>
    const endpoint = document
      .querySelector('meta[name="sovereign-commerce-endpoint"]')
      ?.getAttribute('content')
      ?.trim()
      ?.replace(/\/$/, '');

    function escapeHTML(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatTimestamp(value) {
      if (!value) {
        return 'Pending';
      }

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }

      return new Intl.DateTimeFormat(undefined, {
        dateStyle: 'long',
        timeStyle: 'short'
      }).format(date);
    }

    async function loadOrder(attempt = 0) {
      const params = new URLSearchParams(window.location.search);
      const orderID = String(params.get('order_id') || '').trim();
      const token = String(params.get('token') || '').trim();
      const checkoutSessionID = String(params.get('checkout_session_id') || '').trim();
      const meta = document.getElementById('order-meta');
      const status = document.getElementById('order-status');
      const statusLabel = document.getElementById('order-status-label');

      if (!orderID || !token) {
        statusLabel.textContent = 'Unavailable';
        status.textContent = 'Missing order link details.';
        return;
      }

      statusLabel.textContent = 'Loading';
      status.textContent = 'Loading order state...';

      const response = await fetch(`${endpoint}/orders/${encodeURIComponent(orderID)}?token=${encodeURIComponent(token)}`);
      const payload = await response.json();

      if (response.status === 404 && checkoutSessionID && attempt < 8) {
        status.textContent = 'Finalizing your order...';
        window.setTimeout(() => {
          void loadOrder(attempt + 1);
        }, 3000);
        return;
      }

      if (!response.ok) {
        throw new Error(payload.error || 'Unable to load order.');
      }

      const units = Array.isArray(payload.assigned_units) ? payload.assigned_units : [];
      meta.innerHTML = `
        <div class="invoice-row"><span class="invoice-label">Order:</span><span class="code code-wrap">${escapeHTML(payload.order_id)}</span></div>
        <div class="invoice-row"><span class="invoice-label">Status:</span><span class="code">${escapeHTML(payload.status)}</span></div>
        <div class="invoice-row"><span class="invoice-label">Email:</span><span class="code code-wrap">${escapeHTML(payload.customer_email || '')}</span></div>
        <div class="invoice-row"><span class="invoice-label">Created:</span><span class="code">${escapeHTML(formatTimestamp(payload.created_at))}</span></div>
        <div class="invoice-row"><span class="invoice-label">Paid:</span><span class="code">${escapeHTML(formatTimestamp(payload.paid_at))}</span></div>
        <div class="invoice-row"><span class="invoice-label">Assigned Units:</span><span class="code code-wrap">${escapeHTML(units.length ? units.join(', ') : 'Pending')}</span></div>
      `;

      if (payload.status === 'checkout_pending') {
        statusLabel.textContent = 'Processing';
        status.textContent = checkoutSessionID
          ? 'Payment is processing. Refreshing order state...'
          : 'Payment has not completed yet. Refresh after checkout completes.';
        if (checkoutSessionID && attempt < 8) {
          window.setTimeout(() => {
            void loadOrder(attempt + 1);
          }, 5000);
        }
        return;
      }

      if (payload.status === 'paid' && units.length === 0) {
        statusLabel.textContent = 'Assigning';
        status.textContent = 'Payment received. Assigning units in the background...';
        window.setTimeout(() => window.location.reload(), 5000);
        return;
      }

      if (payload.status === 'complete' || payload.status === 'fulfilled') {
        statusLabel.textContent = units.length ? 'Complete' : 'Confirmed';
        status.textContent = units.length
          ? 'Order is complete and units are assigned.'
          : 'Order is complete.';
        return;
      }

      statusLabel.textContent = units.length ? 'Confirmed' : 'Paid';
      status.textContent = units.length
        ? 'Order is confirmed and units are assigned.'
        : 'Order is confirmed.';
    }

    loadOrder().catch((error) => {
      document.getElementById('order-status-label').textContent = 'Unavailable';
      document.getElementById('order-status').textContent = error.message || 'Unable to load order.';
    });
  </script>
</body>
</html>
